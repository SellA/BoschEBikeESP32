[platformio]
default_envs = esp32dev, lolin32_lite, esp32-s3-zero

[env:base]
platform = espressif32
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = min_spiffs.csv
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3
build_flags =
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER_DISABLED
    -DWHEEL_CIRCUMFERENCE_MM=2105
extra_scripts = post:scripts/copy_firmware.py

[env:esp32dev]
extends = env:base
board = esp32dev

[env:lolin32_lite]
extends = env:base
board = lolin32_lite
upload_port = COM10
monitor_port = COM10

[env:esp32-s3-zero]
extends = env:base
board = esp32-s3-zero-4mb
upload_port = COM3
monitor_port = COM3
monitor_dtr = 0
monitor_rts = 0
build_flags =
    ${env:base.build_flags}
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DBRIDGE_BATTERY_ADC_PIN=-1
    -DSTARTUP_LED_ACTIVE_LOW=0
