[env:lolin32_lite]
platform = espressif32
board = lolin32_lite
framework = arduino
monitor_speed = 115200
monitor_filters = esp32_exception_decoder
board_build.partitions = min_spiffs.csv
upload_port = COM10
monitor_port = COM10
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3
build_flags =
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER_DISABLED
    -DWHEEL_CIRCUMFERENCE_MM=2105

[env:esp32-s3-zero]
platform = espressif32
board = esp32-s3-zero-4mb
framework = arduino
monitor_speed = 115200
upload_port = COM3
monitor_port = COM3
monitor_dtr = 0
monitor_rts = 0
monitor_filters = esp32_exception_decoder
board_build.partitions = min_spiffs.csv
lib_deps =
    h2zero/NimBLE-Arduino @ ^1.4.3
build_flags =
    -DARDUINO_USB_MODE=1
    -DARDUINO_USB_CDC_ON_BOOT=1
    -DCONFIG_BT_NIMBLE_ROLE_OBSERVER_DISABLED
    -DCONFIG_BT_NIMBLE_ROLE_BROADCASTER_DISABLED
    -DWHEEL_CIRCUMFERENCE_MM=2105
    -DBRIDGE_BATTERY_ADC_PIN=-1
    -DSTARTUP_LED_ACTIVE_LOW=0
